<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <style type="text/css" media="all">
      * {
        margin: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }
      body {
        min-height: 100vh;
      }
      .video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      header {
        position: absolute;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 10px;
        text-transform: uppercase;
        letter-spacing: 5px;
        background: rgba(128, 128, 128, 0.35);
        color: white;
        z-index: 2;
        border-bottom: 1px solid #fff;
        border-top: 1px solid #fff;
      }
      .temp {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .temp img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 50%;
        margin: 0;
      }
      .header-nav {
        display: none;
        cursor: pointer;
      }
      .header-buttons {
        display: none;
        justify-content: center;
        align-items: center;
      }
      .header-buttons a {
        color: white;
        text-decoration: none;
        padding: 10px;
        transition: all 0.6s ease;
        margin: 10px;
      }
      .header-buttons a:hover {
        color: white;
        border-bottom: 2px solid white;
        text-decoration: none;
        padding: 10px;
        border-radius: 10px;
      }
      header p {
        font-size: 200%;
        align-self: center;
      }
      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        background: rgba(0, 0, 0, 0.35);
        padding: 20px;
      }
      a[href="exam"]:hover {
        background: gold;
        color: black
      }
      .main {
        width:100%
      }

      .info {
        padding: 10px;
        width: 100%;
        margin: 20px;
        background: rgba(128, 128, 128, 0.35);
        border: 1px solid #fff;
        border-radius: 10px;
        word-wrap: break-word;

      }
      .profiles {
        width: 100%;
      }
      .profiles h1 {
        align-self: center;
        justify-self: center;
      }
      .admin-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }
      .admin {
        width: 280px;
        height: 300px;
        overflow:hidden;
        border-radius: 10px;
        border: 1px solid lightblue;
        position: relative;
        margin: 10px;
      }
      .admin img {
        object-fit: cover;
        width: 100%;
        height: 100%;
      }
      .dark-overlay {
        position: absolute;
        top: 0;
        width: 280px;
        height: 300px;
        background: linear-gradient(to top,rgb(0,0,0,1), rgb(0,0,0,0))
      }
      .admin .user-info {
        position: absolute;
        bottom: 0;
        left: 30%;
        justify-items: center;
        margin: 10px;
      }
    
      .thumbnail {
        width: 100%;
        max-width: 300px;
        margin-top:50px;
      }

      .thumbnail img {
        width: 100%;
        height: auto;
        display: block;
      }
      .admin code {
        position:absolute;
        top: 0;
        z-index:3;
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 3;
        color: white;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        border-radius: 6px;
      }
      .admin code.second {
        position:absolute;
        top: 0;
        z-index:3;
        position: absolute;
        top: 40px;
        left: 10px;
        z-index: 3;
        color: white;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        border-radius: 6px;
      }
      /*moderator css*/
      .moderator-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .moderators {
        margin-top: 10px;
      }
      @media (max-width: 768px) {
        .header-buttons {
          position:absolute;
          background: gray;
          flex-direction: column;
          top: 60px;
          right: 10px;
          border-radius: 0 0 20%;
          border: 1px solid #fff;
          border-top: none;
        }
        .header-buttons.show {
          display: flex;
        }
        .header-nav {
          display: block;
          font-size: 200%;
          padding: 10px;
        }
        .thumbnail {
          margin-top:20px;
          width: 100%;
          overflow:hidden;
         }
         .thumbnail img {
          object-fit:cover;
          width:100%;
          height:auto;
         }
         .admin-list {
          justify-content: center;
         }
         .admin {
          justify-self:center;
         }
      }
    </style>
  </head>

        <a href="exam">exam</a>
      </div>
    </header>

    <div class="container">
      <div class="thumbnail">
        <img src="https://lynxlab.vercel.app/onecity/home.png" alt="" />
      </div>
      <div class="info">
        <h1>One City </h1>

      </div>
      </div>

     
  </body>

</html>
